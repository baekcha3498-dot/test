<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>전국 해수욕장 이용객 현황 대시보드</title>
<style>
  :root { --bg:#f5f7fb; --card:#ffffff; --ink:#172033; --muted:#667085; --line:#e6eaf2; --primary:#2563eb; --primary-soft:#eaf1ff; --accent:#0f766e; --warn:#b45309; --warn-soft:#fff7ed; --shadow:0 16px 40px rgba(16,24,40,.08); --radius:18px; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif; color:var(--ink); background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 280px); }
  header { padding:34px clamp(16px,4vw,48px) 22px; }
  .hero { max-width:1280px; margin:0 auto; display:flex; justify-content:space-between; gap:24px; align-items:flex-end; }
  h1 { margin:0; font-size:clamp(26px,4vw,44px); letter-spacing:-.04em; line-height:1.12; }
  .subtitle { margin:12px 0 0; color:var(--muted); font-size:15px; }
  .year-badge { background:#111827; color:white; border-radius:999px; padding:10px 16px; font-weight:800; white-space:nowrap; box-shadow:var(--shadow); }
  main { max-width:1280px; margin:0 auto; padding:0 clamp(16px,4vw,48px) 46px; }
  .grid { display:grid; gap:18px; }
  .cards { grid-template-columns:repeat(4,minmax(0,1fr)); margin:8px 0 22px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; }
  .metric-label { color:var(--muted); font-size:13px; font-weight:700; }
  .metric { margin-top:8px; font-size:30px; font-weight:900; letter-spacing:-.03em; }
  .metric small { font-size:15px; color:var(--muted); font-weight:700; }
  .section-title { font-size:20px; font-weight:900; margin:0 0 12px; letter-spacing:-.02em; }
  .charts { grid-template-columns:1.1fr .9fr; margin-bottom:22px; }
  .chart-wrap { min-height:390px; }
  svg { width:100%; height:auto; display:block; }
  .filters { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:12px; align-items:end; margin:8px 20px 16px; }
  label { display:block; color:var(--muted); font-size:12px; font-weight:800; margin-bottom:6px; }
  input, select, button { width:100%; border:1px solid var(--line); background:white; color:var(--ink); border-radius:12px; padding:11px 12px; font-size:14px; }
  button { cursor:pointer; background:var(--primary); border-color:var(--primary); color:white; font-weight:800; padding-left:18px; padding-right:18px; }
  .table-card { padding:0; overflow:hidden; }
  .table-head { padding:18px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap; }
  .hint { color:var(--muted); font-size:13px; }
  .table-scroll { overflow:auto; max-height:620px; }
  table { width:100%; border-collapse:collapse; min-width:780px; }
  th, td { padding:13px 16px; text-align:left; border-bottom:1px solid var(--line); font-size:14px; }
  th { position:sticky; top:0; z-index:2; background:#f8fafc; font-size:12px; color:#475467; cursor:pointer; user-select:none; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; font-weight:750; }
  tr:hover td { background:#f9fbff; }
  tr.hot td { background:var(--warn-soft); }
  .badge { display:inline-block; padding:4px 8px; border-radius:999px; background:var(--primary-soft); color:var(--primary); font-size:12px; font-weight:900; }
  .hot .badge { background:#ffedd5; color:var(--warn); }
  .mini { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:22px; }
  .group-list { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px 16px; margin-top:10px; }
  .group-item { display:flex; justify-content:space-between; gap:12px; padding:10px 0; border-bottom:1px dashed var(--line); font-size:14px; }
  .bar-row { display:grid; grid-template-columns:92px 1fr 82px; gap:10px; align-items:center; margin:9px 0; font-size:13px; }
  .bar-bg { height:10px; border-radius:999px; background:#edf2f7; overflow:hidden; }
  .bar-fill { height:100%; border-radius:999px; background:var(--accent); }
  .footer { color:var(--muted); font-size:12px; margin-top:16px; }
  @media (max-width: 960px) { .cards { grid-template-columns:repeat(2,minmax(0,1fr)); } .charts,.mini { grid-template-columns:1fr; } .filters { grid-template-columns:1fr 1fr; } .hero { align-items:flex-start; flex-direction:column; } }
  @media (max-width: 560px) { .cards,.filters { grid-template-columns:1fr; } .metric { font-size:26px; } .card { padding:16px; } }
</style>
</head>

<header><div class="hero"><div><h1>전국 해수욕장 이용객 현황 대시보드</h1><p class="subtitle">CSV 파일 기준 전국 해수욕장별 이용객 현황을 요약·검색·시각화했습니다.</p></div><div class="year-badge">데이터 기준 연도 2023년</div></div></header>
<main>
  <section class="grid cards" id="summaryCards"></section>

  <section class="grid mini"><div class="card"><h2 class="section-title">시도별 해수욕장 수</h2><div id="sidoCountChart"></div></div><div class="card"><h2 class="section-title">100만 명 이상 시군구</h2><div id="millionCities"></div></div></section>
  <section class="card table-card"><div class="table-head"><div><h2 class="section-title" style="margin-bottom:4px">데이터 표</h2><div class="hint">컬럼 제목을 클릭하면 정렬됩니다. 100만 명 이상 시군구 행은 주황색으로 강조됩니다.</div></div><div class="hint" id="rowCount"></div></div>
    <div class="filters"><div><label for="sidoFilter">시도 필터</label><select id="sidoFilter"><option value="">전체 시도</option></select></div><div><label for="minVisitors">최소 이용객 수</label><input id="minVisitors" type="number" min="0" placeholder="예: 100000" /></div><div><label for="searchName">해수욕장명 검색</label><input id="searchName" type="search" placeholder="예: 해운대, 경포대" /></div><div><label>&nbsp;</label><button id="resetBtn">초기화</button></div></div>
    <div class="table-scroll"><table><thead><tr><th data-key="시도">시도</th><th data-key="시군구">시군구</th><th data-key="해수욕장명">해수욕장명</th><th data-key="visitors">2023년 이용객 수</th></tr></thead><tbody id="dataBody"></tbody></table></div>
  </section>
  <p class="footer">데이터 출처: 업로드된 CSV 파일 「3.해양수산부_해수욕장 이용객 현황 데이터.csv」</p>
</main>

function renderSidoCount() { const entries = sortedEntries(sidoCount).map(([label,value])=>({label,value})); const max = entries[0].value; document.getElementById('sidoCountChart').innerHTML = entries.map(d=>`<div class="bar-row"><strong>${d.label}</strong><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.value/max*100)}%"></div></div><span>${fmt.format(d.value)}개소</span></div>`).join(''); }
function renderMillionCities() { const entries = sortedEntries(citySum).filter(([k,v])=>v>=1000000); document.getElementById('millionCities').innerHTML = `<div class="group-list">` + entries.map(([k,v])=>`<div class="group-item"><strong>${k}</strong><span class="badge">${fmt.format(v)}명</span></div>`).join('') + `</div>`; }
function getFiltered() { const sido = document.getElementById('sidoFilter').value; const min = Number(document.getElementById('minVisitors').value || 0); const q = document.getElementById('searchName').value.trim().toLowerCase(); return rows.filter(r => (!sido || r['시도']===sido) && r.visitors>=min && (!q || r['해수욕장명'].toLowerCase().includes(q))); }
function renderTable() { let data = getFiltered(); data.sort((a,b)=>{ const av=a[sortKey], bv=b[sortKey]; if(typeof av==='number') return (av-bv)*sortDir; return String(av).localeCompare(String(bv),'ko')*sortDir; }); document.getElementById('rowCount').textContent = `${fmt.format(data.length)}개 행 표시 / 전체 ${fmt.format(rows.length)}개`; document.getElementById('dataBody').innerHTML = data.map(r=>`<tr class="${millionCitySet.has(r['시군구'])?'hot':''}"><td><span class="badge">${r['시도']}</span></td><td>${r['시군구']}</td><td>${r['해수욕장명']}</td><td class="num">${fmt.format(r.visitors)}</td></tr>`).join(''); }
function initFilters() { const sidos = Object.keys(sidoSum).sort((a,b)=>a.localeCompare(b,'ko')); document.getElementById('sidoFilter').innerHTML += sidos.map(s=>`<option value="${s}">${s}</option>`).join(''); ['sidoFilter','minVisitors','searchName'].forEach(id=>document.getElementById(id).addEventListener('input', renderTable)); document.getElementById('resetBtn').addEventListener('click', ()=>{ document.getElementById('sidoFilter').value=''; document.getElementById('minVisitors').value=''; document.getElementById('searchName').value=''; renderTable(); }); document.querySelectorAll('th[data-key]').forEach(th=>th.addEventListener('click',()=>{ const key=th.dataset.key; if(sortKey===key) sortDir*=-1; else {sortKey=key; sortDir= key==='visitors' ? -1 : 1;} renderTable(); })); }
